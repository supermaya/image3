        /* 갤러리 컨테이너가 전체 화면을 차지하도록 만듭니다 */

        /* 모바일 전체 - 세로모드 고정으로 기본적으로 좌측패널만 표시 */
        @media (max-width: 768px) {
            html, body {
                width: 100vw !important;
                height: 100vh !important;
                height: 100dvh !important; /* 동적 뷰포트 높이 - 모바일 브라우저 UI 고려 */
                transform: none !important;
                transform-origin: left top !important;
                overflow: hidden !important;
            }

            .main-container {
                display: block;
                width: 100vw;
                height: 100vh;
                height: 100dvh; /* 동적 뷰포트 높이 */
                transform: none !important;
            }

            .music-list-container {
                width: 100%;
                height: 100vh;
                height: 100dvh; /* 동적 뷰포트 높이 - 모바일 브라우저 UI 고려 */
                border-right: none;
                border-bottom: none;
                position: relative;
                z-index: 1;
                overflow-y: auto;
                -webkit-overflow-scrolling: touch; /* iOS 부드러운 스크롤 */
            }

            .gallery-container {
                display: none !important;
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
            }

            #gallery-placeholder {
                display: none !important;
            }

            /* 모바일 전체화면 갤러리 */
            body.mobile-portrait-mode .music-list-container {
                display: none;
            }
            body.mobile-portrait-mode .gallery-container {
                display: flex !important;
                background-color: #000;
                position: fixed;
                top: 0;
                left: 0;
                width: 100vw;
                height: 100vh;
                height: 100dvh; /* 동적 뷰포트 높이 - 모바일 브라우저 UI 고려 */
                z-index: 1000;
            }

            /* 모바일 세로모드에서 이미지가 전체 뷰포트를 덮도록 스케일링 */
            body.mobile-portrait-mode .gallery-item {
                width: 100vw !important;
                height: 100vh !important;
                height: 100dvh !important;
                display: flex !important;
                align-items: center;
                justify-content: center;
                position: absolute;
                top: 0;
                left: 0;
            }

            body.mobile-portrait-mode .gallery-item img {
                width: 100vw !important;
                height: 100vh !important;
                height: 100dvh !important;
                max-width: none !important;
                max-height: none !important;
                object-fit: cover !important; /* 전체 뷰포트를 덮도록 */
                object-position: center !important;
                user-select: none;
            }

            /* 모바일 세로 모드에서 폼 컨테이너를 좌측 패널 영역에만 표시 (표시될 때만) */
            body.mobile-portrait-mode #form-container[style*="flex"] {
                z-index: 1100 !important;
                position: fixed !important;
                top: 0 !important;
                left: 0 !important;
                width: 50vw !important;
                height: 100vh !important;
                height: 100dvh !important; /* 동적 뷰포트 높이 */
                background: rgba(0, 0, 0, 0.8) !important;
                justify-content: center !important;
                align-items: center !important;
            }

            /* 모바일 세로 모드에서 로그인 섹션을 좌측 패널 스타일로 */
            body.mobile-portrait-mode #form-container .login-section,
            body.mobile-portrait-mode #form-container .upload-section,
            body.mobile-portrait-mode #form-container .edit-section {
                width: 90% !important;
                height: auto !important;
                max-width: 350px !important;
                margin: 0 !important;
                border-radius: 8px !important;
                background: white !important;
                padding: 20px !important;
                box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3) !important;
                overflow-y: auto !important;
                max-height: 80vh !important;
            }

            /* 모바일 로그인 팝업 스타일 - 리스트 패널 내부 absolute 오버레이 */
            #mobile-login-popup {
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: rgba(0, 0, 0, 0.8);
                z-index: 2000;
                display: none;
                align-items: center;
                justify-content: center;
                padding: 20px;
                box-sizing: border-box;
            }

            #mobile-login-popup.show {

            }

            #mobile-login-popup .login-section,
            #mobile-login-popup .upload-section,
            #mobile-login-popup .edit-section {
                width: 90%;
                max-width: 350px;
                height: auto;
                max-height: 80%;
                margin: 0;
                border-radius: 8px;
                background: white;
                padding: 20px;
                box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
                overflow-y: auto;
                position: relative;
            }
        }

        /* 모바일 전체모드에서만 표시되는 컨트롤 버튼 스타일 */
        .mobile-controls {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1001;
            display: none;
            gap: 15px;
            background: transparent;
            padding: 0;
            align-items: center;
        }

        /* PC/모바일 가로모드에서 갤러리가 활성화되면 컨트롤 버튼 표시 */
        body:not(.mobile-portrait-mode) .mobile-controls.active {
            display: flex;
        }

        /* 모바일 가로모드에서 강제로 컨트롤 버튼 표시 */
        @media (max-width: 768px) and (orientation: landscape) {
            .mobile-controls.active {
                display: flex !important;
            }
        }

        /* 모바일 세로모드에서는 기본적으로 숨김 */
        @media (max-width: 768px) and (orientation: portrait) {
            .mobile-controls {
                display: none !important;
            }

            /* 모바일 세로모드 + 갤러리 전체화면에서만 표시 */
            body.mobile-portrait-mode .mobile-controls.active {
                display: flex !important;
            }
        }
        .mobile-controls button {
            padding: 12px 16px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            color: white;
            font-weight: bold;

            align-items: center;
            justify-content: center;

        .mobile-controls .btn-prev,

            height: 55px;

        .mobile-controls .btn-play:hover,
        .mobile-controls .btn-play:active {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }
        .mobile-controls .btn-prev:hover,
        .mobile-controls .btn-prev:active,
        .mobile-controls .btn-next:hover,
        .mobile-controls .btn-next:active {

            transform: scale(1.05);
        }


        /* PC모드에서는 목록으로 버튼 숨기기 및 플레이 버튼 우측 패널 중앙정렬 */
        @media (min-width: 769px) {
            .mobile-controls .btn-exit {
                display: none !important;
            }
            .mobile-controls {
                justify-content: center !important;
                align-items: center !important;
                /* 우측 패널(420px 시작)의 하단 중앙에 배치 */
                left: calc(420px + (100vw - 420px) / 2);
                bottom: 30px;
                transform: translateX(-50%);
            }
        }

        /* 모바일 가로모드에서도 목록으로 버튼 숨기기 및 플레이 버튼 우측 패널 중앙정렬 */
        @media (max-width: 768px) and (orientation: landscape) {
            .mobile-controls .btn-exit {
                display: none !important;
            }
            .mobile-controls {
                justify-content: center;
                /* 우측 패널의 하단 중앙에 배치 (화면의 50%~100% 영역의 중앙 = 75%) */
                left: 75%;
                bottom: 30px;
                transform: translateX(-50%);
            }

        /* 전체화면 전환 알림 메시지 스타일 */
        .fullscreen-notification {

            font-size: 16px;

        .music-card {

            align-items: center;

        // 모바일 감지 및 제어 함수

        // Firestore에서 저장된 음악 목록 로드
        async function loadSavedMusicFromFirestore() {
            try {
                const user = window.firebaseAuth.currentUser;
                if (!user) {
                    mySavedMusic = [];
                    return;
                }

                // Firestore에서 저장된 음악 목록 가져오기
                const savedMusicRef = window.firebaseCollection(window.firebaseDb, 'savedMusic');
                const querySnapshot = await window.firebaseGetDocs(
                    window.firebaseQuery(savedMusicRef,
                        window.firebaseWhere('userId', '==', user.uid)
                    )
                );

                const savedMusicData = [];
                querySnapshot.forEach(doc => {
                    const data = doc.data();
                    savedMusicData.push({
                        musicId: data.musicId,
                        createdAt: data.createdAt
                    });
                });

                // createdAt으로 정렬 (최신순)
                savedMusicData.sort((a, b) => {
                    const dateA = new Date(a.createdAt || 0);
                    const dateB = new Date(b.createdAt || 0);
                    return dateB - dateA;
                });

                const savedMusicIds = savedMusicData.map(item => item.musicId);

                // 전체 음악 목록에서 저장된 음악만 필터링 (정렬 순서 유지)
                mySavedMusic = savedMusicIds
                    .map(id => allMusicData.find(music => music.id === id || music.musicId === id))
                    .filter(music => music !== undefined);

                console.log('Firestore에서 저장 목록 로드 완료:', mySavedMusic.length);
                updateMusicListUI(mySavedMusic, false);

                // 저장 목록 로드 시 자동 재생 비활성화
                // setTimeout(() => {
                //     startPlayingSavedMusic();
                // }, 100);
            } catch (error) {
                console.error("Firestore 저장 목록 로드 오류:", error);
                mySavedMusic = [];
                updateMusicListUI([], false);
            }
        }

        function loadSavedMusicList() {

                if (!user) {
                    alert('로그인이 필요합니다.');
                    return;
                }

                // Firestore에서 사용자 정보 가져오기
                const userDocRef = window.firebaseDoc(window.firebaseDb, 'users', user.uid);
                const userDoc = await window.firebaseGetDoc(userDocRef);

                let userData;
                if (!userDoc.exists()) {
                    // 사용자 문서가 없으면 기본 문서 생성
                    console.log('loadUserInfo: 사용자 문서가 존재하지 않음 - 새로 생성');
                    const newUserData = {
                        email: user.email,
                        role: 'user',
                        createdAt: window.firebaseServerTimestamp(),
                        dailyPoints: 0,
                        walletBalance: 0
                    };

                    try {
                        await window.firebaseSetDoc(userDocRef, newUserData);
                        userData = newUserData;
                        console.log('loadUserInfo: 새 사용자 문서 생성 완료');

                // 사용자 정보 객체 생성

                    email: userData.email || user.email,
                    joinDate: userData.createdAt || new Date().toISOString(),

        // 구매이력 로드 함수
        function loadPurchaseHistory() {
            const historyContent = document.getElementById('history-content');
            if (!historyContent) return;

            fetch('api.php', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ action: 'getPurchaseHistory' })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success && data.transactions && data.transactions.length > 0) {
                    let html = '';
                    data.transactions.forEach(transaction => {
                        const date = new Date(transaction.created_at);
                        const formattedDate = date.toLocaleDateString('ko-KR', {
                            year: 'numeric',
                            month: '2-digit',
                            day: '2-digit',
                            hour: '2-digit',
                            minute: '2-digit'
                        });

                        const amountColor = transaction.amount > 0 ? '#27ae60' : '#e74c3c';
                        const amountSign = transaction.amount > 0 ? '+' : '';

                        html += `
                            <div style="border-bottom: 1px solid #eee; padding: 12px 0; display: flex; justify-content: space-between; align-items: center;">
                                <div>
                                    <div style="font-size: 14px; color: #333; margin-bottom: 4px;">${transaction.description}</div>
                                    <div style="font-size: 12px; color: #999;">${formattedDate}</div>
                                </div>
                                <div style="font-size: 18px; font-weight: bold; color: ${amountColor};">
                                    ${amountSign}${transaction.amount}P
                                </div>
                            </div>
                        `;
                    });
                    historyContent.innerHTML = html;
                } else {
                    historyContent.innerHTML = '<div style="text-align: center; padding: 20px; color: #999;">구매이력이 없습니다.</div>';
                }
            })
            .catch(error => {
                console.error('구매이력 로드 오류:', error);
                historyContent.innerHTML = '<div style="text-align: center; padding: 20px; color: #e74c3c;">구매이력을 불러오는 중 오류가 발생했습니다.</div>';

        // 추천 갤러리 목록 로드
        async function loadRecommendedMusic() {
            try {
                // Firestore에서 추천 음악만 가져오기
                const musicCollection = window.firebaseCollection(window.firebaseDb, 'music');
                const recommendedQuery = window.firebaseQuery(
                    musicCollection,
                    window.firebaseWhere('isRecommended', '==', 1),
                    window.firebaseOrderBy('uploadedAt', 'desc')
                );

                const querySnapshot = await window.firebaseGetDocs(recommendedQuery);
                const musicList = [];

                querySnapshot.forEach((doc) => {
                    const data = doc.data();

                    // 삭제된 음악은 제외
                    if (data.deleted) return;

                    musicList.push({
                        id: doc.id,
                        musicId: doc.id,
                        name: data.name,
                        audioSrc: data.audioSrc,
                        category: data.category,
                        isRecommended: data.isRecommended || 0,
                        images: data.images.map((img, idx) => {
                            const randomLikes = Math.floor(Math.random() * 101) + 100; // 100~200 사이의 랜덤값
                            return {
                                id: `${doc.id}_${idx}`,
                                imageSrc: img.imageSrc,
                                order: img.order || idx,
                                isLiked: 0,
                                likeCount: randomLikes,
                                defaultLikes: randomLikes,
                                serverLikeCount: 0
                            };
                        })
                    });
                });

                mySunoMusic = musicList;
                totalItems = mySunoMusic.length;
                totalPages = Math.ceil(totalItems / itemsPerPage);
                currentPage = 1;
                updateMusicListUI(mySunoMusic, false);

                // 첫 번째 추천 갤러리 자동 오픈
                if (mySunoMusic.length > 0 && mySunoMusic[0].images && mySunoMusic[0].images.length > 0) {
                    showGallery(mySunoMusic[0].musicId || mySunoMusic[0].id, mySunoMusic[0].images);
                }

                // 추천 목록 로드 시 자동 재생 비활성화
                // setTimeout(() => {
                //     startPlayingRecommendedMusic();
                // }, 100);
            } catch (error) {
                console.error('추천 목록 로드 중 오류:', error);
                alert('추천 갤러리를 불러오는 중 오류가 발생했습니다.');
            }
        }

        // 전체화면 알림 메시지를 표시하는 함수
        function showFullscreenNotification() {
            // 기존 알림이 있으면 제거
            const existingNotification = document.querySelector('.fullscreen-notification');
            if (existingNotification) {
                existingNotification.remove();
            }

            // 새 알림 메시지 생성
            const notification = document.createElement('div');
            notification.className = 'fullscreen-notification';
            notification.textContent = 'F11 : Full Window Mode / ESC : Full View Exit';
            document.body.appendChild(notification);

            // 애니메이션으로 표시
            setTimeout(() => {
                notification.classList.add('show');
            }, 100);

            // 3초 후 페이드아웃 및 제거
            setTimeout(() => {
                notification.classList.remove('show');
                setTimeout(() => {
                    if (notification.parentNode) {
                        notification.parentNode.removeChild(notification);
                    }
                }, 300);
            }, 3000);
        }

        // 자동전환 속도 설정 함수 (구버전 호환용)
        function setAutoplaySpeed(seconds) {
            // 속도 설정
            currentAutoplayTiming = seconds * 1000;

            // 버튼 활성화 상태 업데이트
            document.querySelectorAll('.speed-button').forEach(btn => {
                btn.classList.remove('active');
            });
            const activeButton = document.getElementById(`speed-${seconds}`);
            if (activeButton) {
                activeButton.classList.add('active');
            }

            // 현재 자동 전환 중이라면 재시작
            if (isAutoTransitioning && currentImageInterval) {
                clearInterval(currentImageInterval);
                currentImageInterval = setInterval(() => {
                    const items = document.querySelectorAll('#image-gallery .gallery-item');
                    if (items.length > 1 && isAutoTransitioning) {
                        items[currentImageIndex].classList.remove('active');
                        currentImageIndex = (currentImageIndex + 1) % items.length;
                        items[currentImageIndex].classList.add('active');
                        updateImageOrderDisplay();
                    }
                }, currentAutoplayTiming);
            }

            // 메시지 표시
            showGalleryMessage(`자동전환 속도: ${seconds}초`);
        }

        // 슬라이드 타이머 토글 함수 (3초 → 5초 → 10초 순환)
        function toggleSlideSpeed() {
            const timerButton = document.getElementById('slide-timer-button');
            if (!timerButton) return;

            const currentSeconds = parseInt(timerButton.getAttribute('data-seconds') || '3');
            let nextSeconds;

            // 3초 → 5초 → 10초 → 3초 순환
            if (currentSeconds === 3) {
                nextSeconds = 5;
            } else if (currentSeconds === 5) {
                nextSeconds = 10;
            } else {
                nextSeconds = 3;
            }

            // 속도 설정
            currentAutoplayTiming = nextSeconds * 1000;
            timerButton.setAttribute('data-seconds', nextSeconds);

            // 현재 자동 전환 중이라면 재시작
            if (isAutoTransitioning && currentImageInterval) {
                clearInterval(currentImageInterval);
                currentImageInterval = setInterval(() => {
                    const items = document.querySelectorAll('#image-gallery .gallery-item');
                    if (items.length > 1 && isAutoTransitioning) {
                        items[currentImageIndex].classList.remove('active');
                        currentImageIndex = (currentImageIndex + 1) % items.length;
                        items[currentImageIndex].classList.add('active');
                        updateImageOrderDisplay();
                    }
                }, currentAutoplayTiming);
            }

            // 메시지 표시
            showGalleryMessage(`슬라이드 자동전환: ${nextSeconds}초`);
        }

        // 갤러리 영역을 보이게 하고 스크롤로 포커싱
        function focusGallery() {
            const wrapper = document.getElementById('gallery-wrapper');
            if (!wrapper) return;
            wrapper.style.display = 'flex';
            wrapper.classList.add('active');

            // 모바일 반응형 체크
            checkMobileOrientation();

            // showGallery()가 DOM을 그린 뒤 부드럽게 스크롤
            requestAnimationFrame(() => {
                if (!isMobilePortraitMode) {
                    wrapper.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }
            });
        }

        async function loadMusicDataFromServer() {
            try {
                // Firestore에서 음악 데이터 가져오기
                const musicCollection = window.firebaseCollection(window.firebaseDb, 'music');
                let musicQuery;

                // 모든 음악 가져오기 (인덱스 없이도 작동)
                musicQuery = window.firebaseQuery(
                    musicCollection
                );

                const querySnapshot = await window.firebaseGetDocs(musicQuery);
                const musicList = [];

                querySnapshot.forEach((doc) => {
                    const data = doc.data();

                    // 삭제된 음악은 제외
                    if (data.deleted) return;

                    musicList.push({
                        id: doc.id,
                        musicId: doc.id,
                        name: data.name,
                        audioSrc: data.audioSrc,
                        category: data.category,
                        uploadedAt: data.uploadedAt, // 정렬을 위해 추가
                        isRecommended: data.isRecommended || 0,
                        // 🔑 중요: 업로더 정보 포함 (잠금 해제에 필요)
                        uploadedBy: data.uploadedBy,
                        uploadedByEmail: data.uploadedByEmail,
                        createdBy: data.createdBy,
                        images: data.images.map((img, idx) => {
                            const randomLikes = Math.floor(Math.random() * 101) + 100; // 100~200 사이의 랜덤값
                            return {
                                id: img.id || `${doc.id}_${idx}`, // Firestore에 저장된 ID 우선 사용
                                imageSrc: img.imageSrc,
                                order: img.order || idx,
                                isLiked: 0,
                                likeCount: randomLikes,
                                defaultLikes: randomLikes,
                                serverLikeCount: 0
                            };
                        })
                    });
                });

                // 클라이언트 사이드 필터링 및 정렬
                let filteredMusicList = musicList;

                // topSection에 해당하는 카테고리 목록 구하기
                const filteredCategoryDetails = allCategoryDetails.filter(cat =>
                    cat.topSection === currentTopSection
                );
                const topSectionCategories = filteredCategoryDetails.map(cat => cat.name);

                // 1. topSection에 속하는 음악만 먼저 필터링
                if (!isShowingLiked) {
                    filteredMusicList = musicList.filter(music => topSectionCategories.includes(music.category));
                }

                // 2. 특정 카테고리 필터링
                if (!isShowingLiked && currentCategory && currentCategory !== 'all') {
                    filteredMusicList = filteredMusicList.filter(music => music.category === currentCategory);
                }

                // uploadedAt으로 정렬 (최신순)
                filteredMusicList.sort((a, b) => {
                    // uploadedAt이 없는 경우를 대비
                    const dateA = a.uploadedAt || new Date(0);
                    const dateB = b.uploadedAt || new Date(0);
                    return new Date(dateB) - new Date(dateA);
                });

                // 사용자가 로그인한 경우 좋아요 정보 병합
                const user = window.firebaseAuth.currentUser;
                if (user) {
                    try {
                        const userLikesRef = window.firebaseDoc(window.firebaseDb, 'userLikes', user.uid);
                        const userLikesDoc = await window.firebaseGetDoc(userLikesRef);

                        if (userLikesDoc.exists()) {
                            const likedImages = userLikesDoc.data().images || [];
                            const likedImageIds = new Set(likedImages.map(img => img.id));

                            filteredMusicList.forEach(music => {
                                music.images.forEach(image => {
                                    if (likedImageIds.has(image.id)) {
                                        image.isLiked = 1;
                                    }
                                });
                            });
                        }
                    } catch (userLikesError) {
                        console.warn('좋아요 정보 로드 실패 (무시하고 계속):', userLikesError);
                        // 좋아요 정보 로드 실패해도 음악 목록은 표시
                    }
                }

                // filteredMusicList를 mySunoMusic에 할당
                mySunoMusic = filteredMusicList;

                // 전체 데이터를 항상 저장 (카테고리 간 이동을 위해 필요)
                if (!isShowingLiked) {
                    allMusicData = musicList; // 필터링되지 않은 전체 리스트 저장
                    console.log('=== 전체 음악 데이터 저장 ===', allMusicData.length, '개');

                    // 업로더 정보 샘플 로그 (처음 3개만)
                    console.log('업로더 정보 샘플:', allMusicData.slice(0, 3).map(m => ({
                        name: m.name,
                        uploadedBy: m.uploadedBy,
                        uploadedByEmail: m.uploadedByEmail,
                        currentUserId: currentUserId,
                        isOwn: currentUserId && (m.uploadedBy === currentUserId || m.createdBy === currentUserId)
                    })));
                }

                totalItems = mySunoMusic.length;
                totalPages = Math.ceil(totalItems / itemsPerPage);

                // 카테고리 목록 가져오기
                // 1. Firestore categories 컬렉션에서 로드한 카테고리
                // 2. 음악 데이터에서 추출한 카테고리
                // 두 가지를 합쳐서 사용 (중복 제거)
                const musicCategories = [...new Set(musicList.map(m => m.category))].filter(Boolean);
                const allCategoriesSet = new Set([...allCategories, ...musicCategories]);
                let categories = Array.from(allCategoriesSet).filter(Boolean);

                // 현재 topSection에 해당하는 카테고리만 필터링 (위에서 이미 계산한 변수 재사용)
                categories = categories.filter(cat => topSectionCategories.includes(cat));

                console.log('카테고리 로드:', {
                    fromFirestore: allCategories,
                    fromMusic: musicCategories,
                    combined: categories,
                    currentTopSection: currentTopSection,
                    filteredByTopSection: categories
                });

                if (categories.length > 0) {
                    // 카테고리 탭 먼저 렌더링 (음악이 없어도 카테고리는 표시)
                    renderCategoryTabs(categories, filteredCategoryDetails);

                    // 첫 로드이고 현재 카테고리가 null이면 접근 가능한 첫 번째 카테고리를 기본값으로 설정
                    if (currentCategory === null) {
                        currentCategory = findAccessibleDefaultCategory(categories);
                        setTimeout(() => {
                            loadMusicDataFromServer();
                        }, 100);
                        return;
                    }
                }

                updateMusicListUI(mySunoMusic);

                // 카테고리 선택 후 자동 갤러리 오픈 또는 앱 시작시 첫번째 접근 가능한 이미지 자동 선택
                if ((autoOpenGallery || isInitialLoad) && !isShowingLiked) {
                    let firstWithImages = findAccessibleFirstContent(mySunoMusic);

                    if (firstWithImages) {
                        showGallery(firstWithImages.musicId || firstWithImages.id, firstWithImages.images);

                        if (autoOpenGallery && firstWithImages.audioSrc) {
                            togglePlay(firstWithImages.musicId || firstWithImages.id, firstWithImages.audioSrc, firstWithImages.images || []);
                        }

                        const isMobile = window.innerWidth <= 768;
                        const isPortrait = window.innerHeight > window.innerWidth;
                        if (!isMobile || (isMobile && !isPortrait)) {
                            focusGallery();
                        }
                    }
                    autoOpenGallery = false;
                    isInitialLoad = false;
                }

            } catch (error) {
                console.error("데이터 로드 오류:", error);
                mySunoMusic = [];
                totalItems = 0;
                totalPages = 0;
                updateMusicListUI(mySunoMusic);
            }
        }

        // 전체 음악 데이터를 가져오는 함수 (Firestore)
        async function fetchAllMusicData() {
            try {
                const musicCollection = window.firebaseCollection(window.firebaseDb, 'music');
                const querySnapshot = await window.firebaseGetDocs(musicCollection);

                const musicList = [];
                querySnapshot.forEach(doc => {
                    const data = doc.data();
                    musicList.push({
                        id: doc.id,
                        name: data.name || data.title,
                        category: data.category,
                        images: data.images || [],
                        ...data
                    });
                });

                // 전체 음악 데이터에도 좋아요 초기값 설정 (100~200 사이 랜덤)
                allMusicData = musicList.map(music => {
                    if (music.images && Array.isArray(music.images)) {
                        music.images = music.images.map(image => {
                            // 이미지 ID 기반으로 고정된 default 좋아요 수 생성 (100-200)
                            const seed = image.id ? parseInt(image.id) : 0;
                            const defaultLikes = 100 + (seed % 101); // 100~200 사이 고정값

                            // 서버에서 받은 추가 좋아요 수 (serverLikeCount)
                            // isLiked가 true인 경우 최소 1개는 있어야 함
                            const serverLikes = image.serverLikeCount || (image.isLiked ? 1 : 0);

                            // 총 좋아요 수 = default + 서버 좋아요
                            image.likeCount = defaultLikes + serverLikes;
                            image.defaultLikes = defaultLikes; // default 값 별도 저장
                            image.serverLikeCount = serverLikes; // 서버 좋아요 수 별도 저장

                            return image;
                        });
                    }
                    return music;
                });

                console.log('Loaded music data from Firestore:', allMusicData.length, 'items');
            } catch (error) {
                console.error("전체 데이터 로드 오류:", error);
            }
        }

        // 좋아요한 이미지만 서버에서 가져와 렌더링
        async function loadSavedMusic() {
            try {
                const user = window.firebaseAuth.currentUser;
                if (!user) {
                    mySavedMusic = [];
                    updateMusicListUI([], false);
                    return;
                }

                // Firestore에서 좋아요한 이미지 가져오기
                const likedImagesRef = window.firebaseDoc(window.firebaseDb, 'userLikes', user.uid);
                const likedImagesDoc = await window.firebaseGetDoc(likedImagesRef);

                if (!likedImagesDoc.exists()) {
                    console.log('좋아요 문서가 아직 없습니다.');
                    mySavedMusic = [];
                    updateMusicListUI([], false);
                    return;
                }

                const likedImages = likedImagesDoc.data().images || [];

                // 좋아요한 이미지를 음악별로 그룹화
                const musicMap = {};
                likedImages.forEach(imageData => {
                    const musicId = imageData.musicId;
                    if (!musicMap[musicId]) {
                        musicMap[musicId] = {
                            id: musicId,
                            musicId: musicId,
                            name: imageData.musicName,
                            audioSrc: imageData.audioSrc,
                            images: []
                        };
                    }

                    // 이미지 데이터 처리
                    const seed = imageData.id ? parseInt(imageData.id) : 0;
                    const defaultLikes = 100 + (seed % 101);
                    const serverLikes = imageData.likeCount || 0;

                    musicMap[musicId].images.push({
                            id: imageData.id,
                            imageSrc: imageData.imageSrc,
                            likeCount: defaultLikes + serverLikes,
                            defaultLikes: defaultLikes,
                            serverLikeCount: serverLikes,
                            isLiked: 1
                        });
                    });

                mySavedMusic = Object.values(musicMap);
                updateMusicListUI(mySavedMusic, false);

                // 좋아요 목록 로드 시 자동 재생 비활성화
                // setTimeout(() => {
                //     startPlayingLikedMusic();
                // }, 100);
            } catch (error) {
                console.error("좋아요 목록 로드 실패:", error);
                updateMusicListUI([], false);
            }
        }
        
        // 💡 새로운 함수: 카테고리 탭을 동적으로 렌더링
        // 전역 변수로 카테고리 상세 정보 저장
        let categoryClassificationMap = {};
        let allCategories = []; // 전체 카테고리 목록 저장
        let allCategoryDetails = []; // 전체 카테고리 상세 정보 저장

        // 분류별 색상 매핑 함수
        function getClassificationColor(classification) {
            const colors = {
                '인물': '#3B82F6', // 파란색
                '패션': '#EC4899', // 핑크색
                '화보': '#10B981', // 초록색
                '시네마틱': '#8B5CF6'  // 보라색
            };
            return colors[classification] || '#6B7280'; // 기본 회색
        }

        function renderCategoryTabs(categories, categoryDetails) {
            const categoryTabsContainer = document.getElementById('category-tabs');
            categoryTabsContainer.innerHTML = '';

            console.log('Rendering categories:', categories);
            console.log('Category details:', categoryDetails);
            console.log('Current topSection:', currentTopSection);

            // ⚠️ 주의: allCategories와 allCategoryDetails는 전체 카테고리 목록이므로
            // 여기서 덮어쓰면 안 됩니다. loadCategoriesFromFirestore()에서만 설정됩니다.
            // allCategories = categories || [];  // 이 줄을 제거!
            // allCategoryDetails = categoryDetails || [];  // 이 줄을 제거!

            // categoryClassificationMap도 loadCategoriesFromFirestore()에서 설정되므로

            // if (categoryDetails && categoryDetails.length > 0) {
            //     categoryClassificationMap = {};

            //         categoryClassificationMap[cat.name] = cat.classification;

            categories.forEach(category => {

                tab.className = tabClasses;

                // 카테고리의 분류 가져오기
                const classification = categoryClassificationMap[category];
                const categoryColor = getClassificationColor(classification);

                tab.style.borderColor = categoryColor;

                    tab.style.backgroundColor = categoryColor;
                    tab.style.color = '#FFFFFF';

                    tab.style.backgroundColor = categoryColor + '20'; // 20% 투명도
                    tab.style.color = categoryColor;
                }

                // 글자수 12자로 제한
                const displayText = category.length > 12 ? category.substring(0, 12) + '...' : category;

                tab.textContent = displayText;
                tab.title = category; // 전체 텍스트를 툴팁으로 표시
                tab.onclick = () => selectCategory(category);
                categoryTabsContainer.appendChild(tab);
            });
        }


        // 💡 새로운 함수: 각 카테고리의 첫 번째 갤러리인지 확인
        function isFirstGalleryInCategory(musicId, category) {
            if (!category || !mySunoMusic) {
                console.log('isFirstGalleryInCategory: category 또는 mySunoMusic이 없음', {category, hasMySunoMusic: !!mySunoMusic});
                return false;
            }

            // 현재 카테고리의 갤러리들을 찾아서 첫 번째인지 확인
            const categoryGalleries = mySunoMusic.filter(music =>
                music.category === category &&
                Array.isArray(music.images) &&
                music.images.length > 0
            );

            const isFirst = categoryGalleries.length > 0 &&
                   (categoryGalleries[0].musicId || categoryGalleries[0].id) === musicId;

            console.log('isFirstGalleryInCategory 체크:', {
                musicId,
                category,
                categoryGalleriesCount: categoryGalleries.length,
                firstGalleryId: categoryGalleries.length > 0 ? (categoryGalleries[0].musicId || categoryGalleries[0].id) : null,
                isFirst
            });

            return isFirst;
        }

        // 💡 새로운 함수: 당일 시청한 갤러리인지 확인
        function hasViewedGalleryToday(musicId) {
            const today = new Date().toDateString();
            const viewedGalleries = JSON.parse(localStorage.getItem(`viewedGalleries_${userName}_${today}`) || '[]');
            return viewedGalleries.includes(musicId);
        }

        // 💡 새로운 함수: 갤러리를 시청한 것으로 기록
        function markGalleryAsViewed(musicId) {
            const today = new Date().toDateString();
            const storageKey = `viewedGalleries_${userName}_${today}`;
            const viewedGalleries = JSON.parse(localStorage.getItem(storageKey) || '[]');

            if (!viewedGalleries.includes(musicId)) {
                viewedGalleries.push(musicId);
                localStorage.setItem(storageKey, JSON.stringify(viewedGalleries));
            }
        }

        // 💡 새로운 함수: 포인트 차감 여부 결정
        function shouldChargePointsForGallery(musicId, musicItem) {
            console.log('shouldChargePointsForGallery 호출:', {
                musicId,
                musicItem: !!musicItem,
                category: musicItem?.category,
                userRole,
                currentUserId,
                uploadedBy: musicItem?.uploadedBy,
                uploadedByEmail: musicItem?.uploadedByEmail,
                isOwnContent: currentUserId && (musicItem?.uploadedBy === currentUserId || musicItem?.createdBy === currentUserId)
            });

            if (!musicItem) {
                console.log('shouldChargePointsForGallery: musicItem이 없음');
                return false;
            }

            // 관리자는 모든 갤러리 무료
            if (userRole === 'admin') {
                console.log('shouldChargePointsForGallery: 관리자는 무료');
                return false;
            }

            // 크리에이터가 자신이 업로드한 갤러리는 무료 (개선된 비교 로직)
            if (currentUserId) {
                const userIdStr = String(currentUserId || '').trim();
                const uploadedByStr = String(musicItem.uploadedBy || '').trim();
                const createdByStr = String(musicItem.createdBy || '').trim();

                if ((uploadedByStr && uploadedByStr === userIdStr) ||
                    (createdByStr && createdByStr === userIdStr)) {
                    console.log('shouldChargePointsForGallery: 자신이 업로드한 갤러리는 무료', {
                        currentUserId: userIdStr,
                        uploadedBy: uploadedByStr,
                        match: true
                    });
                    return false;
                }
            }

            // 각 카테고리의 첫 번째 갤러리는 무료
            const isFirst = isFirstGalleryInCategory(musicId, musicItem.category);
            if (isFirst) {
                console.log('shouldChargePointsForGallery: 첫 번째 갤러리이므로 무료');
                return false;
            }

            // 당일 이미 본 갤러리는 무료
            const hasViewed = hasViewedGalleryToday(musicId);
            if (hasViewed) {
                console.log('shouldChargePointsForGallery: 당일 이미 본 갤러리이므로 무료');
                return false;
            }

            // 그 외의 경우는 포인트 차감
            console.log('shouldChargePointsForGallery: 포인트 차감 필요');
            return true;
        }

        // 💡 새로운 함수: 기본 카테고리 찾기
        function findAccessibleDefaultCategory(categories) {
            if (!categories || categories.length === 0) {
                return 'all';
            }

            // 첫 번째 카테고리 반환 (모든 사용자가 모든 카테고리에 접근 가능)
            return categories[0];
        }

        // 💡 새로운 함수: 접근 가능한 첫 번째 갤러리 콘텐츠 찾기
        function findAccessibleFirstContent(musicList) {
            if (!musicList || musicList.length === 0) {
                return null;
            }

            // 모든 아이템을 순회하며 이미지가 있는 첫 번째 콘텐츠 찾기 (권한 무관)
            for (const item of musicList) {
                // 이미지가 있는지 확인 (권한에 관계없이 갤러리는 볼 수 있음)
                if (item && Array.isArray(item.images) && item.images.length > 0) {
                    return item;
                }
            }

            return null;
        }

        // 💡 최상위 섹션 선택 함수
        function selectTopSection(section) {
            console.log('최상위 섹션 변경:', section);

            currentTopSection = section;

            // UI 업데이트 - active 클래스
            document.querySelectorAll('.top-nav-item').forEach(item => {
                item.classList.remove('active');
            });
            document.querySelector(`.top-nav-item[data-section="${section}"]`).classList.add('active');

            const categoryTabsContainer = document.getElementById('category-tabs');
            const musicPlayerContainer = document.getElementById('music-player-container');
            const paginationContainer = document.getElementById('pagination-container');

            if (section === 'visual-mode') {

        function renderPagination() {
            const paginationContainer = document.getElementById('pagination-container');
            paginationContainer.innerHTML = '';
            if (totalPages <= 1) return;

            // 이전 페이지 버튼
            const prevButton = document.createElement('button');
            prevButton.textContent = '이전';
            prevButton.disabled = currentPage === 1;
            prevButton.onclick = () => {
                if (currentPage > 1) {
                    currentPage--;
                    loadMusicDataFromServer();
                }
            };
            paginationContainer.appendChild(prevButton);

            // 페이지 번호 버튼
            for (let i = 1; i <= totalPages; i++) {
                const pageButton = document.createElement('button');
                pageButton.textContent = i;
                pageButton.className = i === currentPage ? 'active' : '';
                pageButton.onclick = () => {
                    currentPage = i;
                    loadMusicDataFromServer();
                };
                paginationContainer.appendChild(pageButton);
            }

            // 다음 페이지 버튼
            const nextButton = document.createElement('button');
            nextButton.textContent = '다음';
            nextButton.disabled = currentPage === totalPages;
            nextButton.onclick = () => {
                if (currentPage < totalPages) {
                    currentPage++;
                    loadMusicDataFromServer();
                }
            };
            paginationContainer.appendChild(nextButton);
        }


        // 좋아요 버튼 토글 함수
        // 추천 갤러리 토글 함수
        async function toggleRecommended(musicId, recommended, buttonElement) {
            try {
                const user = window.firebaseAuth.currentUser;
                if (!user) {
                    alert('로그인이 필요합니다.');
                    return;
                }

                // Firestore에서 음악 문서 업데이트
                const musicRef = window.firebaseDoc(window.firebaseDb, 'music', musicId);
                await window.firebaseSetDoc(musicRef, {
                    isRecommended: recommended ? 1 : 0
                }, { merge: true });

                // 버튼 UI 업데이트
                buttonElement.textContent = recommended ? '⭐' : '☆';
                buttonElement.style.color = recommended ? '#FFD700' : '#999';

                // 목록 새로고침
                loadMusicDataFromServer();
            } catch (error) {
                console.error('추천 상태 변경 중 오류:', error);
                alert('추천 상태 변경 중 오류가 발생했습니다.');
            }
        }

        // Firestore에 좋아요 저장 함수
        async function saveToggleLikeToFirestore(imageId, isLiked, musicItem) {
            try {
                const user = window.firebaseAuth.currentUser;
                if (!user) return false;

                const userLikesRef = window.firebaseDoc(window.firebaseDb, 'userLikes', user.uid);
                const userLikesDoc = await window.firebaseGetDoc(userLikesRef);

                let likedImages = [];
                if (userLikesDoc.exists()) {
                    likedImages = userLikesDoc.data().images || [];
                }

                if (isLiked > 0) {
                    // 좋아요 추가
                    const imageData = {
                        id: imageId,
                        musicId: musicItem.musicId || musicItem.id,
                        musicName: musicItem.name || musicItem.title,
                        audioSrc: musicItem.audioSrc,
                        imageSrc: musicItem.images.find(img => img.id == imageId)?.imageSrc,
                        likeCount: 1,
                        timestamp: new Date().toISOString()
                    };

                    // 중복 체크
                    const existingIndex = likedImages.findIndex(img => img.id == imageId);
                    if (existingIndex === -1) {
                        likedImages.push(imageData);
                    }
                } else {
                    // 좋아요 취소
                    likedImages = likedImages.filter(img => img.id != imageId);
                }

                // Firestore 업데이트
                await window.firebaseSetDoc(userLikesRef, { images: likedImages }, { merge: true });
                return true;
            } catch (error) {
                console.error('Firestore 좋아요 저장 오류:', error);
                return false;
            }
        }

        // 롤백 헬퍼 함수
        function rollbackLike(targetImage) {
            if (targetImage.isLiked > 0) {
                targetImage.serverLikeCount = Math.max(0, targetImage.serverLikeCount - 1);
                targetImage.likeCount = (targetImage.defaultLikes || 0) + targetImage.serverLikeCount;
                targetImage.isLiked = 0;
            } else {
                targetImage.serverLikeCount = targetImage.serverLikeCount + 1;
                targetImage.likeCount = (targetImage.defaultLikes || 0) + targetImage.serverLikeCount;
                targetImage.isLiked = 1;
            }
        }

        function toggleLike(imageId) {
            // 로그인하지 않은 사용자는 좋아요 기능 제한
            if (!userRole) {
                showLoginSection();
                return;
            }

            // 현재 이미지가 속한 카테고리 확인 필요
            const currentMusicList = isShowingLiked ? mySavedMusic : mySunoMusic;
            const musicItem = currentMusicList.find(music => {
                if (music.images && Array.isArray(music.images)) {
                    return music.images.some(img => img.id == imageId);
                }
                return false;
            });

            // 클라이언트 측에서 즉시 좋아요 수 업데이트
            if (musicItem && musicItem.images) {
                const targetImage = musicItem.images.find(img => img.id == imageId);
                if (targetImage) {
                    const wasLiked = targetImage.isLiked > 0;
                    console.log('좋아요 상태 변경 전 - wasLiked:', wasLiked, 'serverLikeCount:', targetImage.serverLikeCount, 'totalLikeCount:', targetImage.likeCount);

                    if (!wasLiked) {
                        // 좋아요 추가
                        targetImage.serverLikeCount = (targetImage.serverLikeCount || 0) + 1;
                        targetImage.likeCount = (targetImage.defaultLikes || 0) + targetImage.serverLikeCount;
                        targetImage.isLiked = 1;
                        console.log('좋아요 추가 후 - serverLikeCount:', targetImage.serverLikeCount, 'totalLikeCount:', targetImage.likeCount);
                    } else {
                        // 좋아요 취소
                        targetImage.serverLikeCount = Math.max(0, (targetImage.serverLikeCount || 0) - 1);
                        targetImage.likeCount = (targetImage.defaultLikes || 0) + targetImage.serverLikeCount;
                        targetImage.isLiked = 0;
                        console.log('좋아요 취소 후 - serverLikeCount:', targetImage.serverLikeCount, 'totalLikeCount:', targetImage.likeCount);
                    }

                    // allMusicData에서도 동일하게 업데이트
                    const allMusicItem = allMusicData.find(music => {
                        if (music.images && Array.isArray(music.images)) {
                            return music.images.some(img => img.id == imageId);
                        }
                        return false;
                    });

        // 💎 현재 포인트 조회 (헬퍼 함수)
        async function getTotalPoints() {
            try {
                const user = window.firebaseAuth.currentUser;
                if (!user) return 0;

                const userDocRef = window.firebaseDoc(window.firebaseDb, 'users', user.uid);
                const userDoc = await window.firebaseGetDoc(userDocRef);

                if (!userDoc.exists()) return 0;

                const userData = userDoc.data();
                const dailyPoints = userData.dailyPoints || 0;
                const walletBalance = userData.walletBalance || 0;
                return dailyPoints + walletBalance;
            } catch (error) {
                console.error('포인트 조회 오류:', error);
                return 0;
            }
        }

        // 💎 갤러리 4K ZIP 파일 다운로드 (백엔드 API 사용)
        async function downloadGalleryImages(musicId, images) {
            try {
                const user = window.firebaseAuth.currentUser;
                if (!user) {
                    alert('로그인이 필요합니다.');
                    return;
                }

                // 구매 여부 확인
                const isPurchased = await checkGalleryPurchase(musicId);

                let confirmMessage;
                if (isPurchased) {
                    confirmMessage = `이미 구매한 갤러리입니다.\n4K ZIP 파일을 무료로 재다운로드하시겠습니까?`;
                } else {
                    const totalPoints = await getTotalPoints();
                    if (totalPoints < 50) {
                        showAdForPointsModalForGallery(musicId, images);
                        return;
                    }
                    confirmMessage = `50 포인트를 사용하여 4K ZIP 파일을 다운로드하시겠습니까?`;
                }

                if (!confirm(confirmMessage)) {
                    return;
                }

                showGalleryMessage('⏳ 다운로드 링크 생성 중...', 3000);

                // 백엔드 API 호출
                const idToken = await user.getIdToken();
                const response = await fetch('https://us-central1-pixelplanet-95dd9.cloudfunctions.net/api/download', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${idToken}`
                    },
                    body: JSON.stringify({
                        galleryId: musicId
                    })
                });

                const result = await response.json();

                if (!response.ok) {
                    if (result.code === 'INSUFFICIENT_POINTS') {
                        showAdForPointsModalForGallery(musicId, images);
                        return;
                    }
                    throw new Error(result.message || '다운로드 처리 중 오류가 발생했습니다.');
                }

                // Signed URL로 다운로드 시작
                const link = document.createElement('a');
                link.href = result.downloadUrl;
                link.download = `gallery_${musicId}_4k.zip`;
                document.body.appendChild(link);

        async function checkGalleryPurchase(galleryId) {
            try {

                if (!user) return false;

                const idToken = await user.getIdToken();
                const response = await fetch('https://us-central1-pixelplanet-95dd9.cloudfunctions.net/api/download/purchases', {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${idToken}`

                return purchases.some(purchase => purchase.galleryId === galleryId);

                return false;

        // Media Session API 설정 (블루투스/헤드폰 컨트롤 연동)
        function setupMediaSession() {
            if ('mediaSession' in navigator) {
                try {
                    // 현재 재생 중인 음악 정보 설정
                    const musicList = (isShowingLiked || isShowingSaved) ? mySavedMusic : mySunoMusic;
                    const currentMusic = musicList && currentMusicIndex >= 0 ? musicList[currentMusicIndex] : null;

                    if (currentMusic) {
                        // 첫 번째 이미지 가져오기
                        const firstImage = currentMusic.images && currentMusic.images.length > 0
                            ? (currentMusic.images[0].imageSrc || currentMusic.images[0])
                            : '';

                        navigator.mediaSession.metadata = new MediaMetadata({
                            title: currentMusic.name || currentMusic.title || '갤러리',
                            artist: currentMusic.artist || currentMusic.category || 'Unknown',
                            album: 'PixelPlanet Gallery',
                            artwork: firstImage ? [
                                { src: firstImage, sizes: '512x512', type: 'image/jpeg' }
                            ] : []
                        });
                    }

                    // 재생/일시정지 버튼 핸들러
                    navigator.mediaSession.setActionHandler('play', () => {
                        if (currentAudio) {
                            currentAudio.play();
                            updatePlayButtonIcon(false); // 재생 중
                        }
                    });

                    navigator.mediaSession.setActionHandler('pause', () => {
                        if (currentAudio) {
                            currentAudio.pause();
                            updatePlayButtonIcon(true); // 일시정지
                        }
                    });

                    // 이전 트랙 버튼 핸들러
                    navigator.mediaSession.setActionHandler('previoustrack', () => {
                        console.log('블루투스 이전 트랙 버튼 클릭');
                        playPreviousMusic();
                    });

                    // 다음 트랙 버튼 핸들러
                    navigator.mediaSession.setActionHandler('nexttrack', () => {
                        console.log('블루투스 다음 트랙 버튼 클릭');
                        playNextMusic();
                    });

                    console.log('Media Session API 설정 완료 - 블루투스 컨트롤 연동됨');
                } catch (error) {
                    console.warn('Media Session API 설정 실패:', error);
                }
            } else {
                console.log('Media Session API 미지원 브라우저');
            }
        }

        // 재생 중인 갤러리 강조 표시 함수
        function updatePlayingHighlight(musicId, musicCategory) {
            // 모든 music-card에서 playing 클래스 제거
            document.querySelectorAll('.music-card').forEach(card => {
                card.classList.remove('playing');
            });

            // 현재 재생중인 카드에 playing 클래스 추가
            if (musicId) {
                const playingCard = document.querySelector(`.music-card[data-music-id="${musicId}"]`);
                if (playingCard) {
                    playingCard.classList.add('playing');

                    // 좌측 패널 스크롤하여 재생중인 항목 보이게 하기
                    const container = document.querySelector('.music-list-container');
                    if (container && !isMobilePortraitMode) {
                        const cardTop = playingCard.offsetTop;
                        const containerHeight = container.clientHeight;
                        const scrollPosition = cardTop - (containerHeight / 2) + (playingCard.offsetHeight / 2);

                        container.scrollTo({
                            top: scrollPosition,
                            behavior: 'smooth'
                        });
                    }
                }
            }

            // 모든 category-tab에서 has-playing 클래스 제거
            document.querySelectorAll('.category-tab').forEach(tab => {
                tab.classList.remove('has-playing');
            });

            // 현재 재생중인 음악의 카테고리 탭에 has-playing 클래스 추가
            if (musicCategory) {
                document.querySelectorAll('.category-tab').forEach(tab => {
                    if (tab.textContent.trim() === musicCategory || tab.title === musicCategory) {
                        tab.classList.add('has-playing');
                    }
                });
            }
        }

        function playNextMusic() {
            // 비회원일 때는 자동 재생 중지
            if (!userName || !userRole) {
                console.log('비회원 - 자동 재생 중지');
                if (currentAudio) {
                    currentAudio.pause();
                    const button = document.querySelector(`.music-card[data-music-id="${currentAudio.id.replace('audio-', '')}"] .play-button`);
                    if(button) {
                        button.innerHTML = `
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M8 5v14l11-7z"/>
                            </svg>
                        `;
                    }
                }
                return;
            }

            // 로그인한 회원만 현재 카테고리 내에서 자동 재생
            // 카테고리 간 이동을 위해 전체 데이터(allMusicData) 사용
            const musicList = isShowingLiked ? mySavedMusic : (isShowingSaved ? mySavedMusic : (allMusicData || mySunoMusic));

            if (!musicList || musicList.length === 0 || currentMusicIndex < 0) {
                console.log('재생할 음악이 없음');
                return;
            }

            const currentMusic = musicList[currentMusicIndex];
            if (!currentMusic) {
                console.log('현재 음악을 찾을 수 없음');
                return;
            }

            let nextMusic;
            let nextGlobalIndex;

            // 좋아요 보기 또는 목록 보기 모드일 때는 전체 리스트를 순환
            if (isShowingLiked || isShowingSaved) {
                nextGlobalIndex = currentMusicIndex + 1;
                if (nextGlobalIndex >= musicList.length) {
                    nextGlobalIndex = 0; // 전체 리스트에서 순환
                }
                nextMusic = musicList[nextGlobalIndex];
                currentMusicIndex = nextGlobalIndex;
            } else {
                // 일반 모드일 때는 현재 카테고리 내의 음악들만 필터링
                const currentCategory = currentMusic.category;
                const categoryMusicList = musicList.filter(music => music.category === currentCategory);

                // 좌측 패널과 동일한 순서로 정렬 (uploadedAt 내림차순)
                categoryMusicList.sort((a, b) => {
                    const dateA = a.uploadedAt || new Date(0);

        // 이미지 순서 표시 업데이트 함수
        function updateImageOrderDisplay() {
            const orderDisplays = document.querySelectorAll('.image-order-display');
            const galleryItems = document.querySelectorAll('#image-gallery .gallery-item');
            const reorderInputs = document.querySelectorAll('.reorder-input');

            orderDisplays.forEach((display, index) => {
                const galleryItem = galleryItems[index];
                if (galleryItem && galleryItem.classList.contains('active')) {
                    display.style.background = 'rgba(255,215,0,0.9)'; // 활성 이미지는 금색
                    display.style.color = 'black';

                    // 현재 활성 이미지의 순서 입력 필드 업데이트
                    if (reorderInputs[index]) {
                        reorderInputs[index].value = currentImageIndex + 1;
                    }
                } else {
                    display.style.background = 'rgba(0,0,0,0.8)';
                    display.style.color = 'white';
                }
            });

            // 네비게이션 버튼 상태 업데이트
            const navButtons = document.querySelectorAll('.nav-button');
            navButtons.forEach((button, buttonIndex) => {
                const isEven = buttonIndex % 2 === 0; // 짝수 인덱스는 이전 버튼, 홀수는 다음 버튼
                const imageIndex = Math.floor(buttonIndex / 2);
                const galleryItem = galleryItems[imageIndex];

                if (galleryItem && galleryItem.classList.contains('active')) {
                    if (isEven) { // 이전 버튼
                        button.disabled = currentImageIndex === 0;
                    } else { // 다음 버튼
                        button.disabled = currentImageIndex === galleryItems.length - 1;
                    }

                    if (button.disabled) {
                        button.style.opacity = '0.5';
                        button.style.cursor = 'not-allowed';
                    } else {
                        button.style.opacity = '1';
                        button.style.cursor = 'pointer';
                    }
                }
            });
        }

        // 갤러리 메시지 표시 함수
        function showGalleryMessage(message, duration = 1000) {
            const galleryWrapper = document.getElementById('gallery-wrapper');
            if (!galleryWrapper) return;

            // 기존 메시지가 있으면 제거
            const existingMessage = galleryWrapper.querySelector('.gallery-message');
            if (existingMessage) {
                existingMessage.remove();
            }

            // 새 메시지 생성
            const messageElement = document.createElement('div');
            messageElement.className = 'gallery-message';
            messageElement.textContent = message;
            galleryWrapper.appendChild(messageElement);

            // 메시지 표시
            setTimeout(() => {
                messageElement.classList.add('show');
            }, 50);

            // 지정된 시간 후 메시지 제거
            setTimeout(() => {
                messageElement.classList.remove('show');
                setTimeout(() => {
                    if (messageElement.parentNode) {
                        messageElement.parentNode.removeChild(messageElement);
                    }
                }, 300);
            }, duration);
        }

        // 갤러리명 표시 함수
        function showGalleryNameMessage() {
            // 현재 활성화된 이미지의 정보를 표시
            if (currentGalleryInfo && currentGalleryInfo.images && currentGalleryInfo.images.length > 0) {
                const currentImage = currentGalleryInfo.images[currentImageIndex];
                console.log('🖼️ 현재 이미지 정보:', currentImage);
                console.log('🖼️ 이미지 인덱스:', currentImageIndex);
                if (currentImage && (currentImage.name || currentImage.description)) {
                    // 엑셀 파일에서 가져온 이미지 정보가 있으면 표시
                    let message = '';
                    if (currentImage.name) {
                        message += currentImage.name;
                    }
                    if (currentImage.description) {
                        message += (message ? '\n' : '') + currentImage.description;
                    }
                    showGalleryMessage(message, 1500);
                } else {
                    // 이미지 정보가 없으면 갤러리명 표시
                    if (currentGalleryName) {
                        showGalleryMessage(currentGalleryName, 1500);
                    }
                }
            } else if (currentGalleryName) {
                // currentGalleryInfo가 없으면 갤러리명 표시
                showGalleryMessage(currentGalleryName, 1500);
            }
        }

        // 이미지 자동 전환 토글 함수
        function toggleImageAutoTransition() {
            const items = document.querySelectorAll('#image-gallery .gallery-item');
            if (items.length <= 1) return;

            if (isAutoTransitioning) {
                // 자동 전환 중지
                isAutoTransitioning = false;
                if (currentImageInterval) {
                    clearInterval(currentImageInterval);
                    currentImageInterval = null;
                }
                // 현재 이미지 정보와 함께 Hold 메시지 표시
                let holdMessage = 'Hold Image';
                if (currentGalleryInfo && currentGalleryInfo.images && currentGalleryInfo.images.length > 0) {
                    const currentImage = currentGalleryInfo.images[currentImageIndex];
                    if (currentImage && (currentImage.name || currentImage.description)) {
                        let imageInfo = '';
                        if (currentImage.name) {
                            imageInfo += currentImage.name;
                        }
                        if (currentImage.description) {
                            imageInfo += (imageInfo ? '\n' : '') + currentImage.description;
                        }
                        holdMessage = `${imageInfo}\nHold Image`;
                    } else if (currentGalleryName) {
                        holdMessage = `${currentGalleryName}\nHold Image`;
                    }
                } else if (currentGalleryName) {
                    holdMessage = `${currentGalleryName}\nHold Image`;
                }
                showGalleryMessage(holdMessage);
            } else {
                // 자동 전환 재시작
                isAutoTransitioning = true;
                currentImageInterval = setInterval(() => {
                    const galleryItems = document.querySelectorAll('#image-gallery .gallery-item');
                    if (galleryItems.length > 1 && isAutoTransitioning) {
                        galleryItems[currentImageIndex].classList.remove('active');
                        currentImageIndex = (currentImageIndex + 1) % galleryItems.length;
                        galleryItems[currentImageIndex].classList.add('active');
                        updateImageOrderDisplay(); // 순서 표시 업데이트
                    }
                }, currentAutoplayTiming);
                const seconds = Math.round(currentAutoplayTiming / 1000);
                showGalleryMessage(`Auto Mode ${seconds} sec`);
            }
        }

        // 개별 이미지 삭제 함수 (Firebase 버전)
        async function deleteImage(musicId, imageId, event) {
            if (event) {
                event.stopPropagation();
                event.preventDefault();
            }

            console.log('Delete image called:', { musicId, imageId });

            const confirmMessage = '이 이미지를 영구적으로 삭제하시겠습니까?\n\n삭제된 이미지는 복구할 수 없습니다.';
            if (!confirm(confirmMessage)) {
                return;
            }

            // 삭제 중 버튼 비활성화 및 로딩 표시
            const deleteButton = event?.target;
            if (deleteButton) {
                deleteButton.disabled = true;
                deleteButton.innerHTML = '⏳';
                deleteButton.style.opacity = '0.6';
            }

            try {
                // 1. musicId를 파라미터로 받음 (getCurrentMusicId 불필요)
                const currentMusicId = musicId;
                if (!currentMusicId) {
                    throw new Error('음악 ID를 찾을 수 없습니다.');
                }

                // 2. Firestore에서 음악 문서 가져오기
                const musicRef = window.firebaseDoc(window.firebaseDb, 'music', currentMusicId);
                const musicDoc = await window.firebaseGetDoc(musicRef);

                if (!musicDoc.exists()) {
                    throw new Error('음악 데이터를 찾을 수 없습니다.');
                }

                const musicData = musicDoc.data();
                const images = musicData.images || [];

                // 이미지에 ID 추가
                const imagesWithIds = images.map((img, idx) => ({
                    ...img,
                    id: img.id || `${currentMusicId}_${idx}`
                }));

                // 3. 삭제할 이미지의 인덱스 찾기
                const deleteIndex = imagesWithIds.findIndex(img => img.id === imageId);

                if (deleteIndex === -1) {
                    throw new Error('삭제할 이미지를 찾을 수 없습니다.');
                }

                const imageToDelete = imagesWithIds[deleteIndex];
                console.log('삭제할 이미지 인덱스:', deleteIndex, '전체 이미지 수:', imagesWithIds.length);

                // 4. Firebase Storage에서 이미지 파일 삭제
                if (imageToDelete.imageSrc) {
                    try {
                        // imageSrc가 Firebase Storage URL인 경우 파일 삭제
                        if (imageToDelete.imageSrc.includes('firebasestorage.googleapis.com')) {
                            // URL에서 파일 경로 추출
                            const url = new URL(imageToDelete.imageSrc);
                            const pathMatch = url.pathname.match(/\/o\/(.+?)(\?|$)/);

                            if (pathMatch) {
                                const filePath = decodeURIComponent(pathMatch[1]);
                                const fileRef = window.firebaseStorageRef(window.firebaseStorage, filePath);

                                await window.firebaseDeleteObject(fileRef);
                                console.log('Firebase Storage에서 이미지 파일 삭제 완료:', filePath);
                            }
                        }
                    } catch (storageError) {
                        console.warn('Firebase Storage 삭제 중 오류 (계속 진행):', storageError);
                        // Storage 삭제 실패해도 Firestore는 업데이트
                    }
                }

                // 5. Firestore에서 이미지 정보 제거
                const updatedImages = imagesWithIds.filter(img => img.id !== imageId);

                // order 속성 재정렬
                updatedImages.forEach((img, idx) => {
                    img.order = idx;
                });

                // 다음 이미지 인덱스 계산
                let nextImageIndex;
                if (updatedImages.length === 0) {
                    // 모든 이미지가 삭제됨
                    nextImageIndex = -1;
                } else if (deleteIndex >= updatedImages.length) {
                    // 마지막 이미지를 삭제한 경우, 새로운 마지막 이미지로 이동
                    nextImageIndex = updatedImages.length - 1;
                } else {
                    // 삭제된 이미지의 다음 이미지로 이동 (같은 인덱스 위치)
                    nextImageIndex = deleteIndex;
                }

                console.log('다음 이미지 인덱스:', nextImageIndex);

                // Firestore 업데이트
                await window.firebaseSetDoc(musicRef, { images: updatedImages }, { merge: true });

                console.log('Firestore에서 이미지 정보 삭제 완료');
                console.log('이미지 삭제 성공:', imageId);

                // 6. 즉시 UI에서 해당 이미지 제거 (부드러운 애니메이션)
                const imageElement = document.querySelector(`[data-image-id="${imageId}"]`);
                if (imageElement) {
                    imageElement.style.transition = 'opacity 0.3s ease-out';
                    imageElement.style.opacity = '0';
                    setTimeout(() => {
                        if (imageElement.parentNode) {
                            imageElement.remove();
                        }
                    }, 300);
                }

                // 7. 현재 음악의 이미지 목록 업데이트
                const currentMusic = mySunoMusic.find(music =>
                    (music.musicId || music.id) === currentMusicId
                );

                if (currentMusic) {
                    // 이미지가 모두 삭제되었다면 갤러리 닫기
                    if (updatedImages.length === 0) {
                        currentMusic.images = [];
                        setTimeout(() => {
                            hideAllPanelsExcept('gallery-placeholder');
                            document.getElementById('gallery-placeholder').innerHTML = '<p>이미지가 모두 삭제되었습니다.</p>';
                        }, 500);
                    } else {
                        // 남은 이미지가 있다면 해당 위치로 갤러리 이동
                        currentMusic.images = updatedImages;

                        setTimeout(() => {
                            // 삭제된 이미지의 다음 번호로 갤러리 표시
                            showGalleryWithIndex(
                                currentMusicId,
                                updatedImages,
                                nextImageIndex,
                                currentMusic.audioSrc,
                                currentMusic.name,
                                currentMusic.createdBy
                            );

                            console.log(`이미지 삭제 후 ${nextImageIndex + 1}번째 이미지로 이동`);
                            showGalleryMessage(`이미지 삭제 완료 (${nextImageIndex + 1}/${updatedImages.length})`, 1500);
                        }, 300);
                    }
                }

                // 8. allMusicData에서도 제거
                const allMusic = allMusicData.find(music => {
                    if (music.images && Array.isArray(music.images)) {
                        return music.images.some(img => img.id == imageId);
                    }
                    return false;
                });
                if (allMusic && allMusic.images) {
                    allMusic.images = allMusic.images.filter(img => img.id !== imageId);

        // Firestore에서 카테고리 목록을 로드하는 함수
        async function loadCategoriesFromFirestore() {
            try {
                const categoriesRef = window.firebaseCollection(window.firebaseDb, 'categories');
                const querySnapshot = await window.firebaseGetDocs(categoriesRef);

                const categories = [];
                const categoryDetails = [];

                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    // 문서 ID를 카테고리 이름으로 사용
                    const categoryName = doc.id;
                    categories.push(categoryName);
                    categoryDetails.push({
                        name: categoryName,
                        topSection: data.topSection || 'visual-mode',
                        classification: data.classification || '기타',
                        description: data.description || '',
                        isAdult: data.isAdult || false
                    });
                });

                // 전역 변수 업데이트
                allCategories = categories;
                allCategoryDetails = categoryDetails;

                // categoryClassificationMap 업데이트
                categoryClassificationMap = {};
                categoryDetails.forEach(cat => {
                    categoryClassificationMap[cat.name] = cat.classification;
                });

                console.log('=== 카테고리 로드 완료 ===');
                console.log('Firestore에서 로드한 카테고리:', categories);
                console.log('카테고리 상세 정보:', categoryDetails);
                console.log('성인 카테고리:', categoryDetails.filter(cat => cat.isAdult).map(cat => cat.name));
                console.log('카테고리 분류 맵:', categoryClassificationMap);
                return categories;
            } catch (error) {
                console.error('카테고리 로드 실패:', error);
                return [];
            }
        }

        async function handleSignup(event) {
            event.preventDefault();
            const email = document.getElementById('signup-email').value;
            const password = document.getElementById('signup-password').value;
            const role = document.getElementById('signup-role').value;

            try {
                const userCredential = await window.firebaseCreateUserWithEmailAndPassword(
                    window.firebaseAuth,
                    email,
                    password
                );

                const today = new Date().toISOString().split('T')[0]; // YYYY-MM-DD

                // Firestore에 사용자 정보 저장 (초기 포인트 포함)
                try {
                    await window.firebaseSetDoc(
                        window.firebaseDoc(window.firebaseDb, 'users', userCredential.user.uid),
                        {
                            email: email,
                            role: role,
                            createdAt: new Date().toISOString(),
                            dailyPoints: 0,
                            walletBalance: 1000,  // 가입 축하 포인트 1000P (지갑 포인트로 지급)
                            lastDailyPointClaim: today  // 오늘 날짜로 설정하여 가입 당일 추가 100P 방지
                        }
                    );

                    console.log('회원가입 완료 - Firestore 저장 완료:', {
                        uid: userCredential.user.uid,
                        email: email,
                        role: role,
                        walletBalance: 1000
                    });

                    alert(`회원가입 성공! ${role === 'creator' ? '크리에이터' : '일반 회원'}으로 등록되었습니다.\n가입 축하 포인트 1000P가 지급되었습니다!`);
                } catch (firestoreError) {
                    console.error('Firestore 저장 실패:', firestoreError);
                    alert('회원가입은 완료되었으나 사용자 정보 저장에 실패했습니다.\n로그인 후 관리자에게 문의해주세요.');
                    throw firestoreError;  // 에러를 다시 throw하여 외부 catch로 전달
                }

                // 회원가입 폼 닫기
                const formContainer = document.getElementById('form-container');
                if (formContainer) formContainer.style.display = 'none';

                // 모바일 세로모드 팝업도 닫기
                const mobilePopup = document.getElementById('mobile-login-popup');
                if (mobilePopup) {
                    mobilePopup.classList.remove('show');
                    mobilePopup.innerHTML = '';
                }

                // Firebase Auth 상태가 onAuthStateChanged로 자동 업데이트됨

            console.log('데일리 포인트 체크:', { today, lastClaimDate, isNewDay: lastClaimDate !== today });

            if (lastClaimDate !== today) {
                try {
                    // 오늘 아직 포인트를 받지 않았으면 60P 지급
                    const userDocRef = window.firebaseDoc(window.firebaseDb, 'users', userId);
                    const currentDailyPoints = userData.dailyPoints || 0;
                    const newDailyPoints = currentDailyPoints + 60;

                    await window.firebaseSetDoc(userDocRef, {
                        dailyPoints: newDailyPoints,
                        lastDailyPointClaim: today
                    }, { merge: true });

                    console.log('데일리 포인트 지급 완료:', newDailyPoints);

                    // UI 업데이트
