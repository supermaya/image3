        // 🔒 트랜잭션 기반 포인트 차감 (동시성 문제 방지)
        async function usePoints(amount = 17) {
            try {
                const user = window.firebaseAuth.currentUser;
                if (!user) {
                    alert('로그인이 필요합니다.');
                    return false;
                }

                const userDocRef = window.firebaseDoc(window.firebaseDb, 'users', user.uid);

                // 트랜잭션으로 포인트 차감
                const result = await window.firebaseRunTransaction(window.firebaseDb, async (transaction) => {
                    const userDoc = await transaction.get(userDocRef);

                    if (!userDoc.exists()) {
                        throw new Error('사용자 정보를 찾을 수 없습니다.');
                    }

                    const userData = userDoc.data();
                    let dailyPoints = userData.dailyPoints || 0;
                    let walletBalance = userData.walletBalance || 0;
                    const totalPoints = dailyPoints + walletBalance;

                    // 포인트 부족 체크
                    if (totalPoints < amount) {
                        throw new Error('INSUFFICIENT_POINTS');
                    }

                    // 일일 포인트부터 차감
                    if (dailyPoints >= amount) {
                        dailyPoints -= amount;
                    } else {
                        const remaining = amount - dailyPoints;
                        dailyPoints = 0;
                        walletBalance -= remaining;
                    }

                    // 트랜잭션으로 업데이트
                    transaction.update(userDocRef, {
                        dailyPoints: dailyPoints,
                        walletBalance: walletBalance
                    });

                    return { success: true, dailyPoints, walletBalance };
                });

                console.log('✅ 포인트 차감 완료:', result);

                // 포인트 표시 업데이트
                updatePointsDisplay();
                return true;

            } catch (error) {
                console.error('포인트 사용 오류:', error);

                if (error.message === 'INSUFFICIENT_POINTS') {
                    alert('포인트가 부족합니다.');
                } else {
                    alert('포인트 사용 중 오류가 발생했습니다.');
                }
                return false;
            }
        }

        function checkZipFileSize(input) {

        // 엑셀 파일에서 이미지 메타데이터 파싱 함수
        async function parseExcelFile(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = function(e) {
                    try {
                        const data = new Uint8Array(e.target.result);
                        const workbook = XLSX.read(data, { type: 'array' });
                        const firstSheetName = workbook.SheetNames[0];
                        const worksheet = workbook.Sheets[firstSheetName];
                        const jsonData = XLSX.utils.sheet_to_json(worksheet, { header: 1 });

                        // 헤더를 제외한 데이터 파싱
                        const imageMetadata = {};
                        console.log('📊 엑셀 전체 데이터:', jsonData);
                        for (let i = 1; i < jsonData.length; i++) {
                            const row = jsonData[i];
                            console.log(`📊 행 ${i}:`, row);
                            if (row.length >= 3) {
                                const imageIndex = parseInt(row[0]) - 1; // 엑셀에서는 1부터 시작, 배열은 0부터
                                imageMetadata[imageIndex] = {
                                    name: row[1] || '',
                                    description: row[2] || ''
                                };
                                console.log(`📊 파싱 결과 [${imageIndex}]:`, imageMetadata[imageIndex]);
                            }
                        }
                        console.log('📊 최종 메타데이터:', imageMetadata);
                        resolve(imageMetadata);
                    } catch (error) {
                        console.error('엑셀 파일 파싱 오류:', error);
                        reject(error);
                    }
                };
                reader.onerror = reject;
                reader.readAsArrayBuffer(file);
            });
        }

            if (!confirm('음원과 모든 관련 이미지를 정말로 삭제하시겠습니까?\n\n이 작업은 되돌릴 수 없으며, Firebase Storage의 모든 파일도 영구적으로 삭제됩니다.')) {

                const user = window.firebaseAuth.currentUser;
                if (!user) {
                    alert('로그인이 필요합니다.');
                    return;
                }

                console.log('음악 삭제 시작:', musicId);

                // 1. Firestore에서 음악 문서 가져오기
                const musicRef = window.firebaseDoc(window.firebaseDb, 'music', musicId);
                const musicDoc = await window.firebaseGetDoc(musicRef);

                if (!musicDoc.exists()) {
                    alert('음악을 찾을 수 없습니다.');
                    return;
                }

                const musicData = musicDoc.data();
                const images = musicData.images || [];
                const audioSrc = musicData.audioSrc;

                console.log('=== 음악 삭제 상세 정보 ===');
                console.log('음악 ID:', musicId);
                console.log('이미지 배열:', images);
                console.log('이미지 개수:', images.length);
                console.log('오디오 URL:', audioSrc);

                let deletedImagesCount = 0;
                let failedImagesCount = 0;

                // 2. Firebase Storage에서 모든 이미지 파일 삭제
                if (images && images.length > 0) {
                    console.log(`${images.length}개의 이미지 삭제 시작...`);

                    for (const image of images) {
                        console.log('이미지 처리 중:', image);

                        if (image && image.imageSrc) {
                            console.log('이미지 URL:', image.imageSrc);

                            if (image.imageSrc.includes('firebasestorage.googleapis.com')) {
                                try {
                                    // URL에서 파일 경로 추출
                                    const url = new URL(image.imageSrc);
                                    const pathMatch = url.pathname.match(/\/o\/(.+?)(\?|$)/);

                                    if (pathMatch) {
                                        const filePath = decodeURIComponent(pathMatch[1]);

                } else {
                    console.log('삭제할 이미지가 없습니다.');
                }

                // 3. Firebase Storage에서 오디오 파일 삭제
                let audioDeleted = false;
                if (audioSrc && audioSrc.includes('firebasestorage.googleapis.com')) {
                    console.log('오디오 파일 삭제 시작:', audioSrc);
                    try {
                        const url = new URL(audioSrc);
                        const pathMatch = url.pathname.match(/\/o\/(.+?)(\?|$)/);

                        if (pathMatch) {
                            const filePath = decodeURIComponent(pathMatch[1]);
                            console.log('삭제할 오디오 파일 경로:', filePath);

                            const fileRef = window.firebaseStorageRef(window.firebaseStorage, filePath);

                            await window.firebaseDeleteObject(fileRef);
                            audioDeleted = true;
                            console.log('✓ 오디오 파일 삭제 완료:', filePath);

                            console.warn('오디오 경로 추출 실패:', audioSrc);
                        }
                    } catch (storageError) {
                        console.error('✗ 오디오 파일 삭제 실패:', storageError);
                    }
                } else {
                    console.log('삭제할 오디오가 없거나 Firebase Storage URL이 아닙니다.');
                }

                // 4. Firestore에서 음악 문서 완전히 삭제
                await window.firebaseDeleteDoc(musicRef);
                console.log('✓ Firestore 문서 삭제 완료:', musicId);

                // 5. UI 업데이트
                const totalImages = images.length;

                    `삭제 성공: ${deletedImagesCount}개\n` +
                    `삭제 실패: ${failedImagesCount}개\n` +

        // 새로운 순서 번호를 받아 이미지 순서를 변경하는 함수
        async function reorderImageToOrder(musicId, imageId, newOrder, event) {
            if (event) {
                event.stopPropagation();
            }

            if (!musicId) {
                alert("음악 ID가 누락되었습니다.");
                return;
            }

            try {
                // Firestore에서 현재 음악 데이터 가져오기
                const musicRef = window.firebaseDoc(window.firebaseDb, 'music', musicId);
                const musicDoc = await window.firebaseGetDoc(musicRef);

                if (!musicDoc.exists()) {
                    alert('음악 데이터를 찾을 수 없습니다.');
                    return;
                }

                const musicData = musicDoc.data();
                const images = musicData.images || [];

                console.log('순서 변경 시작:', { musicId, imageId, newOrder });
                console.log('현재 이미지 배열:', images.map((img, idx) => ({ idx, id: img.id, src: img.imageSrc?.substring(0, 50) })));

                // 이미지에 ID가 없으면 생성
                const imagesWithIds = images.map((img, idx) => ({
                    ...img,
                    id: img.id || `${musicId}_${idx}`
                }));

                // 현재 이미지의 인덱스 찾기
                const currentIndex = imagesWithIds.findIndex(img => img.id === imageId);

                console.log('찾은 이미지 인덱스:', currentIndex, '타겟 이미지 ID:', imageId);

                if (currentIndex === -1) {
                    alert('이미지를 찾을 수 없습니다. ID: ' + imageId);
                    console.error('이미지를 찾을 수 없음:', { imageId, availableIds: imagesWithIds.map(img => img.id) });
                    return;
                }

                // 새 순서는 1부터 시작하므로 0-based 인덱스로 변환
                const targetIndex = newOrder - 1;

                if (targetIndex < 0 || targetIndex >= images.length) {
                    alert('유효한 순서 번호를 입력해주세요.');
                    return;
                }

                if (currentIndex === targetIndex) {
                    alert('이미 해당 위치에 있습니다.');
                    return;
                }

                // 이미지를 새 위치로 이동 (배열 재정렬)
                const [movedImage] = imagesWithIds.splice(currentIndex, 1);
                imagesWithIds.splice(targetIndex, 0, movedImage);

                console.log('이동 후 이미지 배열:', imagesWithIds.map((img, idx) => ({ idx, id: img.id, src: img.imageSrc?.substring(0, 50) })));

                // order 속성 업데이트 및 ID 보존
                const finalImages = imagesWithIds.map((img, idx) => ({
                    ...img,
                    order: idx,
                    id: img.id // ID 보존
                }));

                console.log('Firestore에 저장할 이미지:', finalImages.map((img, idx) => ({ idx, id: img.id, order: img.order })));

                // Firestore 업데이트
                await window.firebaseSetDoc(musicRef, { images: finalImages }, { merge: true });

                console.log('이미지 순서가 성공적으로 변경되었습니다.');

                // 갤러리 뷰 갱신 (변경된 이미지 위치로 이동)
                await updateGalleryView(musicId, imageId);

            } catch (error) {
                console.error('이미지 순서 변경 중 오류:', error);
                alert('이미지 순서 변경 중 오류가 발생했습니다: ' + error.message);
            }
        }

        // Firestore에서 최신 데이터를 가져와 갤러리 뷰를 갱신하는 함수
        async function updateGalleryView(musicId, targetImageId) {
            try {
                // Firestore에서 음악 데이터 가져오기
                const musicRef = window.firebaseDoc(window.firebaseDb, 'music', musicId);
                const musicDoc = await window.firebaseGetDoc(musicRef);

                if (!musicDoc.exists()) {
                    console.error("갤러리 뷰 업데이트 실패: 음악을 찾을 수 없습니다.");
                    hideAllPanelsExcept('gallery-placeholder');
                    document.getElementById('gallery-placeholder').textContent = '데이터를 불러오지 못했습니다.';
                    return;
                }

                const currentMusic = musicDoc.data();
                const updatedImages = currentMusic.images || [];

                if (updatedImages.length > 0) {
                    // 이미지 ID 생성 및 매칭
                    const imagesWithIds = updatedImages.map((img, idx) => ({
                        ...img,
                        id: img.id || `${musicId}_${idx}`
                    }));

                    // mySunoMusic 배열 업데이트
                    const musicIndexInList = mySunoMusic.findIndex(music => (music.musicId || music.id) === musicId);
                    if (musicIndexInList !== -1) {
                        mySunoMusic[musicIndexInList].images = imagesWithIds;
                    }

                    // 타겟 이미지의 새로운 위치 찾기
                    const targetIndex = imagesWithIds.findIndex(img => img.id == targetImageId);
                    const finalIndex = targetIndex >= 0 ? targetIndex : 0;

                    console.log('순서 변경 후 이미지 위치:', {
                        targetImageId,
                        newPosition: finalIndex + 1,
                        totalImages: imagesWithIds.length
                    });

                    // currentGalleryInfo 업데이트
                    if (currentGalleryInfo && currentGalleryInfo.musicId === musicId) {
                        currentGalleryInfo.images = imagesWithIds;
                    }

                    // 자동 전환 중지
                    if (isAutoTransitioning) {
                        isAutoTransitioning = false;
                        if (currentImageInterval) {
                            clearInterval(currentImageInterval);
                        }
                    }

                    // 갤러리를 새로고침하지 않고 in-place로 업데이트
                    const galleryItems = document.querySelectorAll('#image-gallery .gallery-item');
                    const imageGallery = document.getElementById('image-gallery');

                    if (galleryItems.length === imagesWithIds.length) {
                        // 이미지 개수가 같으면 순서만 업데이트 (더 부드러움)
                        galleryItems.forEach((item, idx) => {
                            const img = item.querySelector('img');
                            if (img && imagesWithIds[idx]) {
                                img.src = imagesWithIds[idx].imageSrc;
                                item.setAttribute('data-image-id', imagesWithIds[idx].id);
                            }
                        });

                        // 활성 이미지 변경 - 변경된 순서로 이동
                        galleryItems.forEach(item => item.classList.remove('active'));
                        if (galleryItems[finalIndex]) {
                            galleryItems[finalIndex].classList.add('active');
                            currentImageIndex = finalIndex;
                            console.log(`갤러리를 ${finalIndex + 1}번째 이미지로 이동했습니다.`);
                        }

                        // 순서 표시 업데이트
                        updateImageOrderDisplay();

                        // 시각적 피드백: 메시지 표시
                        showGalleryMessage(`이미지 순서가 ${finalIndex + 1}번으로 변경되었습니다.`, 1500);
                    } else {
                        // 이미지 개수가 다르면 전체 갤러리 새로고침
                        showGalleryWithIndex(
                            musicId,
                            imagesWithIds,
                            finalIndex,
                            currentMusic.audioSrc,
                            currentMusic.name,
                            currentMusic.createdBy
                        );
                    }

                    console.log('갤러리 뷰 업데이트 완료 - 순서 변경 반영됨');
                } else {
                    hideAllPanelsExcept('gallery-placeholder');
                    document.getElementById('gallery-placeholder').textContent = '이 음악에는 이미지가 없습니다.';
                }

            } catch (error) {
                console.error("갤러리 뷰 업데이트 중 오류:", error);
                hideAllPanelsExcept('gallery-placeholder');
                document.getElementById('gallery-placeholder').textContent = '네트워크 오류가 발생했습니다.';
            }
        }

                            <li>구매한 포인트는 영구 보관됩니다</li>
                        </ul>
                    </div>

                    <button onclick="hidePointsPurchasePopup()" style="width: 100%; padding: 15px; background: #95a5a6; color: white; border: none; border-radius: 10px; font-size: 16px; cursor: pointer; transition: background 0.3s;" onmouseover="this.style.background='#7f8c8d'" onmouseout="this.style.background='#95a5a6'">
                        닫기
                    </button>
                </div>
            `;

            // 팝업 닫기 (배경 클릭)
            popup.addEventListener('click', (e) => {
                if (e.target === popup) {
                    hidePointsPurchasePopup();
                }
            });

            document.body.appendChild(popup);
            document.body.style.overflow = 'hidden';
        }

        // 포인트 구매 팝업 닫기 함수
        function hidePointsPurchasePopup() {
            const popup = document.getElementById('points-purchase-popup');
            if (popup) {
                popup.remove();
                document.body.style.overflow = 'auto';
            }
        }

        // 포인트 구매 처리 함수
        async function purchasePoints(points, price) {
            // 실제 결제 연동 시 여기에 결제 로직 추가
            // 현재는 데모 버전으로 바로 포인트 지급
            const confirmed = confirm(`${points}P를 ₩${price.toLocaleString()}에 구매하시겠습니까?\n\n(데모 버전: 실제 결제 없이 포인트가 지급됩니다)`);

            if (!confirmed) return;

            try {
                const user = window.firebaseAuth.currentUser;
                if (!user) {
                    alert('로그인이 필요합니다.');
                    return;
                }

                // Firestore에서 현재 포인트 가져오기
                const userDocRef = window.firebaseDoc(window.firebaseDb, 'users', user.uid);
                const userDoc = await window.firebaseGetDoc(userDocRef);

                if (!userDoc.exists()) {
                    alert('사용자 정보를 찾을 수 없습니다.');
                    return;
                }

                const userData = userDoc.data();
                const currentWalletBalance = userData.walletBalance || 0;
                const newWalletBalance = currentWalletBalance + points;

                // 포인트 업데이트
                await window.firebaseSetDoc(userDocRef, {
                    walletBalance: newWalletBalance
                }, { merge: true });

                // 거래 내역 추가
                const transactionRef = window.firebaseCollection(window.firebaseDb, 'pointTransactions');
                await window.firebaseAddDoc(transactionRef, {
                    userId: user.uid,
                    type: 'purchase',
                    amount: points,
                    price: price,
                    description: `포인트 구매 (+${points}P)`,
                    createdAt: new Date()
                });

                alert(`${points}P가 충전되었습니다! 💎`);

                // 포인트 표시 업데이트
                updatePointsDisplay();

                // 팝업 닫기
                hidePointsPurchasePopup();

            } catch (error) {
                console.error('포인트 구매 오류:', error);
                alert('포인트 구매 중 오류가 발생했습니다.');
            }
        }

        function showSubscriptionPopup() {
            const popup = document.getElementById('subscription-popup');
            if (popup) {
                popup.style.display = 'flex';
                document.body.style.overflow = 'hidden';
            }
        }

        // 구독 팝업 숨기기 함수
        function hideSubscriptionPopup() {
            const popup = document.getElementById('subscription-popup');
            if (popup) {
                popup.style.display = 'none';
                document.body.style.overflow = 'auto';
            }
        }

        // LemonSqueezy로 리다이렉트하는 함수
        function subscribe(planType) {
            console.log('구독 함수 호출됨:', planType);

            try {
                let checkoutUrl;

                if (planType === 'yearly') {
                    // 연간 구독 LemonSqueezy Checkout URL (실제 URL로 교체 필요)
                    checkoutUrl = 'https://your-store.lemonsqueezy.com/checkout/buy/yearly-plan-variant-id';
                } else if (planType === 'monthly') {
                    // 월간 구독 LemonSqueezy Checkout URL (실제 URL로 교체 필요)
                    checkoutUrl = 'https://your-store.lemonsqueezy.com/checkout/buy/monthly-plan-variant-id';
                }

                if (checkoutUrl) {
                    console.log('LemonSqueezy Checkout으로 리다이렉트:', { planType, checkoutUrl });

                    // Cross-Origin-Opener-Policy 에러 방지를 위해 현재 창에서 리다이렉트
                    window.location.href = checkoutUrl;

                    // 새 창에서 열고 싶다면 아래 코드 사용 (COOP 경고 메시지가 나타날 수 있음)
                    // const newWindow = window.open(checkoutUrl, '_blank', 'noopener,noreferrer');
                } else {
                    console.error('체크아웃 URL이 설정되지 않음');
                    alert('구독 설정에 문제가 있습니다. 관리자에게 문의해주세요.');
                }

            } catch (error) {
                console.error('구독 함수 실행 중 오류:', error);
                alert('구독 처리 중 오류가 발생했습니다: ' + error.message);
            }
        }

        // ========== 카테고리 추가 기능 ==========

        // 카테고리 추가 모달 표시
        window.showAddCategoryModalInUpload = () => {
            const modal = document.getElementById('addCategoryModalInUpload');
            if (modal) {
                modal.style.display = 'flex';
                document.getElementById('newCategoryNameInUpload')?.focus();
            }
        };

        // 카테고리 추가 모달 숨기기
        window.hideAddCategoryModalInUpload = () => {
            const modal = document.getElementById('addCategoryModalInUpload');
            if (modal) {
                modal.style.display = 'none';
                document.getElementById('newCategoryNameInUpload').value = '';
                document.getElementById('newCategoryClassificationInUpload').value = '';
                document.getElementById('newCategoryDescriptionInUpload').value = '';
            }
        };

        // 카테고리 추가 처리
        window.handleAddCategoryInUpload = async () => {
            const name = document.getElementById('newCategoryNameInUpload').value.trim();
            const classification = document.getElementById('newCategoryClassificationInUpload').value;
            const description = document.getElementById('newCategoryDescriptionInUpload').value.trim();

            if (!name) {
                alert('카테고리 이름을 입력하세요.');
                return;
            }

            if (!classification) {
                alert('분류를 선택하세요.');
                return;
            }

            try {
                // Firestore에 카테고리 추가
                const categoryRef = window.firebaseDoc(window.firebaseCollection(window.firebaseDb, 'categories'));
                await window.firebaseSetDoc(categoryRef, {
                    name: name,
                    classification: classification,
                    description: description,
                    createdAt: new Date(),
                    createdBy: window.firebaseAuth.currentUser.uid
                });

                alert('카테고리가 추가되었습니다!');
                hideAddCategoryModalInUpload();

                // select 박스에 새 카테고리 추가
                const categorySelect = document.getElementById('musicCategory');
                if (categorySelect) {
                    const option = document.createElement('option');
                    option.value = name;
                    option.textContent = name;
                    categorySelect.appendChild(option);
                    categorySelect.value = name;
                }
            } catch (error) {
                console.error('카테고리 추가 오류:', error);
                alert('카테고리 추가 중 오류가 발생했습니다: ' + error.message);
            }
        };

        // ESC 키로 모달 닫기
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                const modal = document.getElementById('addCategoryModalInUpload');
                if (modal && modal.style.display === 'flex') {
                    hideAddCategoryModalInUpload();
                }
            }
        });

        // ========================================
        // 히어로 슬라이드 기능
        // ========================================
        let heroSlides = [];
        let currentHeroSlideIndex = 0;
        let heroSlideInterval = null;

        // 히어로 슬라이드 데이터 로드
        async function loadHeroSlides() {
            try {
                const slidesQuery = query(
                    collection(db, 'heroSlides'),
                    where('active', '==', true),
                    orderBy('order', 'asc')
                );
                const querySnapshot = await getDocs(slidesQuery);

                heroSlides = [];
                querySnapshot.forEach((doc) => {
                    heroSlides.push({ id: doc.id, ...doc.data() });
                });

                if (heroSlides.length > 0) {
                    renderHeroSlides();
                    startHeroSlideAutoPlay();
                }
            } catch (error) {
                console.error('히어로 슬라이드 로드 오류:', error);
            }
        }

        // 히어로 슬라이드 렌더링
        function renderHeroSlides() {
            const sliderContainer = document.getElementById('hero-slider');
            const slidesWrapper = sliderContainer.querySelector('.hero-slides-wrapper');
            const indicators = sliderContainer.querySelector('.hero-slider-indicators');

            if (heroSlides.length === 0) {
                sliderContainer.style.display = 'none';
                return;
            }

            sliderContainer.style.display = 'block';
            slidesWrapper.innerHTML = '';
            indicators.innerHTML = '';

            heroSlides.forEach((slide, index) => {
                // 슬라이드 생성
                const slideElement = document.createElement('div');
                slideElement.className = `hero-slide ${index === 0 ? 'active' : ''}`;

                let slideContent = `
                    <img src="${slide.imageUrl}" alt="${slide.title}">
                    <div class="hero-slide-content">
                        <h2>${slide.title}</h2>
                        ${slide.subtitle ? `<p>${slide.subtitle}</p>` : ''}
                    </div>
                `;

                // 링크가 있으면 클릭 가능하게
                if (slide.link) {
                    slideElement.style.cursor = 'pointer';
                    slideElement.onclick = () => {
                        window.open(slide.link, '_blank');
                    };
                }

                slideElement.innerHTML = slideContent;
                slidesWrapper.appendChild(slideElement);

                // 인디케이터 생성
                const indicator = document.createElement('div');
                indicator.className = `hero-indicator ${index === 0 ? 'active' : ''}`;
                indicator.onclick = () => goToHeroSlide(index);
                indicators.appendChild(indicator);
            });

            currentHeroSlideIndex = 0;
        }

        // 다음 슬라이드
        function heroSliderNext() {
            if (heroSlides.length === 0) return;

            currentHeroSlideIndex = (currentHeroSlideIndex + 1) % heroSlides.length;
            updateHeroSlide();
            resetHeroSlideAutoPlay();
        }

        // 이전 슬라이드
        function heroSliderPrev() {
            if (heroSlides.length === 0) return;

            currentHeroSlideIndex = (currentHeroSlideIndex - 1 + heroSlides.length) % heroSlides.length;
            updateHeroSlide();
            resetHeroSlideAutoPlay();
        }

        // 특정 슬라이드로 이동
        function goToHeroSlide(index) {
            if (heroSlides.length === 0) return;

            currentHeroSlideIndex = index;
            updateHeroSlide();
            resetHeroSlideAutoPlay();
        }

        // 슬라이드 업데이트
        function updateHeroSlide() {
            const slides = document.querySelectorAll('.hero-slide');
            const indicators = document.querySelectorAll('.hero-indicator');

            slides.forEach((slide, index) => {
                if (index === currentHeroSlideIndex) {
                    slide.classList.add('active');
                } else {
                    slide.classList.remove('active');
                }
            });

            indicators.forEach((indicator, index) => {
                if (index === currentHeroSlideIndex) {
                    indicator.classList.add('active');
                } else {
                    indicator.classList.remove('active');
                }
            });
        }

        // 자동 재생 시작
        function startHeroSlideAutoPlay() {
            if (heroSlides.length <= 1) return;

            stopHeroSlideAutoPlay();
            heroSlideInterval = setInterval(() => {
                heroSliderNext();
            }, 5000); // 5초마다 자동 전환
        }

        // 자동 재생 중지
        function stopHeroSlideAutoPlay() {
            if (heroSlideInterval) {
                clearInterval(heroSlideInterval);
                heroSlideInterval = null;
            }
        }

        // 자동 재생 재시작
        function resetHeroSlideAutoPlay() {
            stopHeroSlideAutoPlay();
            startHeroSlideAutoPlay();
        }

        // 페이지 로드 시 히어로 슬라이드 로드
        window.addEventListener('DOMContentLoaded', () => {
            loadHeroSlides();
        });

    </script>

    <!-- 카테고리 추가 모달 -->
    <div id="addCategoryModalInUpload" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 10000; justify-content: center; align-items: center;" onclick="if(event.target === this) hideAddCategoryModalInUpload();">
        <div style="background: white; padding: 30px; border-radius: 15px; max-width: 500px; width: 90%; box-shadow: 0 10px 40px rgba(0,0,0,0.3);" onclick="event.stopPropagation();">
            <h2 style="margin-top: 0; margin-bottom: 20px; color: #333;">새 카테고리 추가</h2>

            <div style="margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 8px; font-weight: 600; color: #555;">카테고리 이름 *</label>
                <input type="text" id="newCategoryNameInUpload"
                       style="width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 14px; box-sizing: border-box;"
                       placeholder="예: 팝, 록, 재즈 등"
                       onkeydown="if(event.key === 'Enter') { event.preventDefault(); handleAddCategoryInUpload(); }">
            </div>

            <div style="margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 8px; font-weight: 600; color: #555;">분류 *</label>
                <select id="newCategoryClassificationInUpload"
                        style="width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 14px; box-sizing: border-box;"
                        onkeydown="if(event.key === 'Enter') { event.preventDefault(); handleAddCategoryInUpload(); }">
                    <option value="">분류를 선택하세요</option>
                    <option value="인물">인물</option>
                    <option value="패션">패션</option>
                    <option value="화보">화보</option>
                    <option value="시네마틱">시네마틱</option>
                </select>
            </div>

            <div style="margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 8px; font-weight: 600; color: #555;">설명 (선택)</label>
                <textarea id="newCategoryDescriptionInUpload"
                          style="width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 14px; box-sizing: border-box; resize: vertical;"
                          rows="3"
                          placeholder="카테고리 설명을 입력하세요"></textarea>
            </div>

            <div style="display: flex; gap: 10px; justify-content: flex-end; margin-top: 25px;">
                <button type="button" onclick="hideAddCategoryModalInUpload()"
                        style="background: #6c757d; color: white; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 600;">
                    취소
                </button>
                <button type="button" onclick="handleAddCategoryInUpload()"
                        style="background: #667eea; color: white; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 600;">
                    추가
                </button>
            </div>
        </div>
    </div>

</body>
</html>
